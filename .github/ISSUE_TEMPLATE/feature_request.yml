name: Feature request
description: Suggest an idea for Ormica
labels: [enhancement]
body:
  - type: textarea
    id: problem
    attributes:
      label: What problem does this solve?
    validations:
      required: true
  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
    validations:
      required: false
  - type: dropdown
    id: area
    attributes:
      label: Which area?
      options:
        - Core engine (arbor/stigma/canopy/mycelium)
        - Cortex (LLM)
        - Colony (industry agents)
        - Integrations
        - CLI / Dashboard
        - Docs
        - Other
