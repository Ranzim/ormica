# FTC Endorsement pack — phrases that draw FTC scrutiny for endorsements,
# testimonials, and income-related claims. Posture aligned with the
# FTC Endorsement Guides (16 CFR Part 255) and the FTC's "Made in USA"
# and income-claim guidance.
#
# NOTE: banned_words defaults to *word-boundary* match (case-insensitive)
# — each phrase only matches when bounded by non-word characters. So
# "guarantee" matches "we guarantee X" but NOT "guaranteed" (different
# whole word) or "unguaranteed" (substring inside another word). For
# stem-with-suffix matching ("guarantee" → guaranteed/guaranteeing/
# guarantees) use the separate banned_word_stems factory. For fragment
# matching inside larger identifiers, opt into substring via the dict
# form: `{words: [cret], match_mode: substring}`.
#
# This pack lists each stem variant explicitly because FTC banned
# phrasings tend to vary across "guaranteed results", "we guarantee",
# "guaranteeing income" etc. — a maintainer reviewing the pack should
# see the full vocabulary in one place rather than rely on inflection.
#
# Use cases: creator / influencer captions, brand-deal copy, ad copy.

name: ftc-endorsement
description: FTC-style banned phrases for endorsements and income claims.
source: https://www.ftc.gov/business-guidance/resources/ftcs-endorsement-guides-what-people-are-asking

rules:
  - banned_words:
      - guaranteed          # income / result guarantees
      - guarantee           # ditto, stem variant
      - miracle             # safety / efficacy puffery
      - cure                # medical claims
      - clinically-proven   # unsupported clinical claims
      - fda-approved        # unauthorized regulatory claims
      - doctor-recommended  # unsubstantiated expert endorsement
      - risk-free           # income / investment puffery
      - investment opportunity  # securities framing
