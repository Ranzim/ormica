# Credential Leak Guard pack — banned strings that should never appear
# verbatim in an agent response. Catches the common-name failure mode
# where a model echoes back placeholder credentials from its context.
#
# Limitation: this is substring matching, NOT format detection. It will
# NOT catch novel API keys, JWTs, or PEM blocks — for that you want a
# pre-stage `block_prompt_pattern` rule with a regex (out of scope here).
# Treat this pack as a tripwire for obvious leaks, not a DLP system.
#
# Use cases: engineering subnodes, support agents that handle ticket
# bodies, any node that touches code or config.

name: credential-leak-guard
description: Reject responses that echo common credential placeholder strings.

rules:
  - banned_words:
      - api_key
      - api-key
      - apikey
      - password
      - passwd
      - bearer_token
      - secret_token
      - private_key
      - aws_secret
      - aws_secret_access_key
      - client_secret
      - access_token
      - refresh_token
